name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build



  build-exe:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Bundle to CJS with esbuild
        run: npx esbuild dist/index.js --bundle --platform=node --target=node20 --outfile=dist/bundle.cjs

      - name: Compile to EXE
        run: npx pkg dist/bundle.cjs --targets node20-win-x64 --output forge.exe --public

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: forge-windows-x64
          path: forge.exe
          if-no-files-found: error

  release:
    name: Release
    needs: [quality, build-exe]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: forge-windows-x64
          path: dist/exe/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/exe/forge.exe
          generate_release_notes: true
